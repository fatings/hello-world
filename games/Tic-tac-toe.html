<!doctype html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Tic Tac Toe num único ficheiro HTML" />
  <title>Tic Tac Toe</title>
  <style>
    :root {
      --bg-1: #141312;
      --bg-2: #0d0c0b;
      --panel: #181716;
      --panel-2: #1d1b1a;
      --surface: #22201e;
      --line: #2d2a28;
      --line-soft: #383431;
      --text: #ece8e4;
      --muted: #a8a19a;
      --accent: #8a7665;
      --accent-soft: #6f6257;
      --winner: #5c5148;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.34);
    }

    * { box-sizing: border-box; }

    html, body { min-height: 100%; }

    body {
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background:
        radial-gradient(circle at top, rgba(138, 118, 101, 0.08), transparent 30%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
    }

    .app {
      width: min(100%, 640px);
      background: linear-gradient(180deg, var(--panel) 0%, #131211 100%);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 28px;
      box-shadow: var(--shadow);
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 20px;
    }

    .eyebrow {
      margin: 0 0 8px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-size: 0.75rem;
      color: var(--muted);
    }

    h1, p { margin: 0; }

    h1 {
      font-size: clamp(1.9rem, 4vw, 2.5rem);
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .status {
      margin: 0 0 18px;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: var(--panel-2);
      color: var(--text);
    }

    .board-wrap {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #121110;
      margin-bottom: 16px;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .square,
    .control {
      border: 1px solid var(--line-soft);
      border-radius: 2px;
      font: inherit;
    }

    .square {
      aspect-ratio: 1 / 1;
      background: linear-gradient(180deg, #24211f 0%, #1a1817 100%);
      color: var(--text);
      font-size: clamp(2.1rem, 8vw, 3.8rem);
      font-weight: 700;
      cursor: pointer;
      transition: background 0.18s ease, border-color 0.18s ease, transform 0.1s ease;
    }

    .square:hover:enabled {
      background: #2a2725;
      border-color: var(--accent-soft);
      transform: translateY(-1px);
    }

    .square:disabled {
      cursor: not-allowed;
      opacity: 1;
    }

    .square.winner {
      background: linear-gradient(180deg, var(--winner) 0%, #4a413a 100%);
      border-color: var(--accent);
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .control {
      padding: 12px 14px;
      cursor: pointer;
      background: #262321;
      color: var(--text);
      transition: background 0.18s ease, border-color 0.18s ease, transform 0.1s ease;
    }

    .control:hover {
      background: #2d2926;
      border-color: var(--accent-soft);
      transform: translateY(-1px);
    }

    .control.secondary {
      background: #1f1d1b;
      color: var(--muted);
    }

    .control.secondary:hover {
      background: #272422;
    }

    .score {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .score div {
      background: #161514;
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 14px 12px;
      text-align: center;
      color: var(--muted);
    }

    .score strong {
      display: block;
      margin-top: 6px;
      font-size: 1.15rem;
      color: var(--text);
      font-weight: 700;
    }

    @media (max-width: 560px) {
      .app {
        padding: 20px;
      }

      .top {
        flex-direction: column;
        align-items: stretch;
      }

      .controls,
      .score {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="top">
      <div>
        <p class="eyebrow">Dark minimal</p>
        <h1>Tic Tac Toe</h1>
      </div>
      <button id="resetAll" class="control secondary" type="button">Limpar placar</button>
    </div>

    <p id="status" class="status">Próximo jogador: X</p>

    <section class="board-wrap">
      <section id="board" class="board" aria-label="Tabuleiro Tic Tac Toe"></section>
    </section>

    <div class="controls">
      <button id="resetRound" class="control" type="button">Reiniciar ronda</button>
      <button id="undoMove" class="control secondary" type="button">Desfazer jogada</button>
    </div>

    <section class="score" aria-label="Placar">
      <div>Vitórias X<strong id="scoreX">0</strong></div>
      <div>Empates<strong id="scoreDraw">0</strong></div>
      <div>Vitórias O<strong id="scoreO">0</strong></div>
    </section>
  </main>

  <script>
    const boardEl = document.getElementById('board')
    const statusEl = document.getElementById('status')
    const scoreXEl = document.getElementById('scoreX')
    const scoreOEl = document.getElementById('scoreO')
    const scoreDrawEl = document.getElementById('scoreDraw')
    const resetRoundBtn = document.getElementById('resetRound')
    const resetAllBtn = document.getElementById('resetAll')
    const undoMoveBtn = document.getElementById('undoMove')

    const winningLines = [
      [0, 1, 2], [3, 4, 5], [6, 7, 8],
      [0, 3, 6], [1, 4, 7], [2, 5, 8],
      [0, 4, 8], [2, 4, 6]
    ]

    let board = Array(9).fill('')
    let currentPlayer = 'X'
    let gameOver = false
    let moveHistory = []
    let score = { X: 0, O: 0, draw: 0 }

    function getWinner() {
      for (const line of winningLines) {
        const [a, b, c] = line
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return { player: board[a], line }
        }
      }
      return null
    }

    function updateScore() {
      scoreXEl.textContent = score.X
      scoreOEl.textContent = score.O
      scoreDrawEl.textContent = score.draw
    }

    function updateStatus(message) {
      statusEl.textContent = message
    }

    function render() {
      const winner = getWinner()
      boardEl.innerHTML = ''

      for (let i = 0; i < 9; i++) {
        const btn = document.createElement('button')
        btn.type = 'button'
        btn.className = 'square'
        btn.textContent = board[i]
        btn.disabled = Boolean(board[i]) || gameOver
        btn.setAttribute('aria-label', board[i] ? `Casa ocupada por ${board[i]}` : 'Casa vazia')

        if (winner && winner.line.includes(i)) {
          btn.classList.add('winner')
        }

        btn.addEventListener('click', () => play(i))
        boardEl.appendChild(btn)
      }

      undoMoveBtn.disabled = moveHistory.length === 0
      undoMoveBtn.style.opacity = moveHistory.length === 0 ? '0.55' : '1'
      undoMoveBtn.style.cursor = moveHistory.length === 0 ? 'not-allowed' : 'pointer'
    }

    function finishGame(winner) {
      gameOver = true
      if (winner) {
        score[winner.player] += 1
        updateStatus(`Vencedor: ${winner.player}`)
      } else {
        score.draw += 1
        updateStatus('Empate')
      }
      updateScore()
      render()
    }

    function play(index) {
      if (board[index] || gameOver) return

      moveHistory.push({ board: [...board], currentPlayer, gameOver })
      board[index] = currentPlayer

      const winner = getWinner()
      if (winner) {
        finishGame(winner)
        return
      }

      if (board.every(Boolean)) {
        finishGame(null)
        return
      }

      currentPlayer = currentPlayer === 'X' ? 'O' : 'X'
      updateStatus(`Próximo jogador: ${currentPlayer}`)
      render()
    }

    function resetRound() {
      board = Array(9).fill('')
      currentPlayer = 'X'
      gameOver = false
      moveHistory = []
      updateStatus('Próximo jogador: X')
      render()
    }

    function resetAll() {
      score = { X: 0, O: 0, draw: 0 }
      updateScore()
      resetRound()
    }

    function undoMove() {
      if (moveHistory.length === 0) return
      const previous = moveHistory.pop()
      board = previous.board
      currentPlayer = previous.currentPlayer
      gameOver = previous.gameOver
      updateStatus(`Próximo jogador: ${currentPlayer}`)
      render()
    }

    resetRoundBtn.addEventListener('click', resetRound)
    resetAllBtn.addEventListener('click', resetAll)
    undoMoveBtn.addEventListener('click', undoMove)

    updateScore()
    render()
  </script>
</body>
</html>
